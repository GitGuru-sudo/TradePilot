services:
  - type: web
    name: internship-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BINANCE_API_KEY
        value: mock
      - key: BINANCE_API_SECRET
        value: mock
      - key: BINANCE_TESTNET
        value: "True"
      - key: USE_MOCK_BINANCE
        value: "True"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        value: "{}"
      - key: USE_MOCK_FIREBASE
        value: "True"
      - key: SUPABASE_URL
        value: "https://mock.supabase.co"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "mock_key"
      - key: PROJECT_NAME
        value: TradePilot
      - key: BACKEND_CORS_ORIGINS
        value: "http://localhost:3000,https://internship-frontend-1.onrender.com"
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: internship-frontend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_MOCK_MODE
        value: "true"
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
        sync: false
